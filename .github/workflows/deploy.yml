name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build — patch bundle and inject live content
        run: |
          python3 << 'PYEOF'
          import hashlib, re, json, os, base64
          re2 = re

          # ── 0. Extract any base64 images still in content.json ───────────
          os.makedirs('assets/uploads', exist_ok=True)

          def extract_b64(b64_str, hint):
              m = re2.match(r'data:image/(\w+);base64,(.+)', b64_str, re2.DOTALL)
              if not m: return b64_str
              ext = m.group(1).replace('jpeg','jpg')
              data_bytes = base64.b64decode(m.group(2))
              fname = re2.sub(r'[^a-zA-Z0-9_-]', '_', hint) + f'.{ext}'
              fpath = f'assets/uploads/{fname}'
              with open(fpath, 'wb') as fh: fh.write(data_bytes)
              print(f'  Extracted {fname} ({len(data_bytes)//1024}KB)')
              return f'/assets/uploads/{fname}'

          with open('content.json', 'r', encoding='utf-8') as f:
              raw = json.load(f)

          changed = False
          for a in raw.get('artists', []):
              if a.get('heroImage','').startswith('data:'):
                  a['heroImage'] = extract_b64(a['heroImage'], a.get('slug','artist') + '-hero')
                  changed = True
              for o in a.get('obras', []):
                  if o.get('imagem','').startswith('data:'):
                      o['imagem'] = extract_b64(o['imagem'], a.get('slug','') + '-obra-' + o.get('id',''))
                      changed = True
          for r in raw.get('registro', []):
              if r.get('url','').startswith('data:'):
                  r['url'] = extract_b64(r['url'], 'registro-' + r.get('id',''))
                  changed = True

          if changed:
              with open('content.json', 'w', encoding='utf-8') as f:
                  json.dump(raw, f, ensure_ascii=False)
              print(f'  content.json cleaned of base64 images')

          # ── 1. Load content.json ──────────────────────────────────────────
          with open('content.json', 'r', encoding='utf-8') as f:
              content = json.load(f)

          # Fix /assets/ paths in content data to include /paporeto/ prefix
          content_str = json.dumps(content, ensure_ascii=False)
          content_str = content_str.replace('"/assets/', '"/paporeto/assets/')
          content = json.loads(content_str)

          artists_json  = json.dumps(content.get('artists',  []), ensure_ascii=False)
          registro_json = json.dumps(content.get('registro', []), ensure_ascii=False)
          site_json     = json.dumps(content.get('site',     {}), ensure_ascii=False)

          # ── 2. Patch JS bundle ───────────────────────────────────────────
          with open('assets/index-D0pt1Yki.js', 'r', encoding='utf-8') as f:
              js = f.read()

          # Fix absolute asset paths for subdirectory deployment
          js = js.replace('"/assets/', '"/paporeto/assets/')
          print(f'  Patched {js.count("/paporeto/assets/")} asset path references')

          # Patch artists array: const Gt=[...] → const Gt=window.__PR_A__||[...]
          js = re.sub(r'(const Gt=)(\[)', r'\1window.__PR_A__||\2', js, count=1)
          # Patch registro array: const Fx=[...] → const Fx=window.__PR_R__||[...]
          js = re.sub(r'(const Fx=)(\[)', r'\1window.__PR_R__||\2', js, count=1)

          with open('assets/index-D0pt1Yki.js', 'w', encoding='utf-8') as f:
              f.write(js)

          # ── 3. Inject content + cache-bust in index.html ─────────────────
          h = hashlib.md5(js.encode()).hexdigest()[:8]
          with open('index.html', 'r', encoding='utf-8') as f:
              html = f.read()

          # Build inline script that sets live data before the app loads
          inline = (
            f'<script>\n'
            f'window.__PR_A__={artists_json};\n'
            f'window.__PR_R__={registro_json};\n'
            f'window.__PR_S__={site_json};\n'
            f'</script>\n'
          )

          # Inject before the app script tag
          html = html.replace(
              '<script type="module"',
              inline + '<script type="module"'
          )

          # Cache-bust JS and CSS references
          html = re.sub(r'(index-D0pt1Yki\.js)(\?[^"]*)?', rf'\1?v={h}', html)
          html = re.sub(r'(index-WF_ZS38y\.css)(\?[^"]*)?', rf'\1?v={h}', html)

          with open('index.html', 'w', encoding='utf-8') as f:
              f.write(html)

          print(f'  Injected {len(content.get("artists",[]))} artists, '
                f'{len(content.get("registro",[]))} registro items')
          print(f'  Cache-busted with hash {h}')
          PYEOF

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
