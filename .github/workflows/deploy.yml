name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fix asset paths for GitHub Pages subdirectory
        run: |
          python3 << 'PYEOF'
          import hashlib, re

          # Patch JS bundle: /assets/ -> /paporeto/assets/
          with open('assets/index-D0pt1Yki.js', 'r', encoding='utf-8') as f:
              js = f.read()
          js = js.replace('"/assets/', '"/paporeto/assets/')
          with open('assets/index-D0pt1Yki.js', 'w', encoding='utf-8') as f:
              f.write(js)
          print(f'Patched {js.count("/paporeto/assets/")} asset path references')

          # Add hash to script/css refs in index.html to bust browser cache
          h = hashlib.md5(js.encode()).hexdigest()[:8]
          with open('index.html', 'r', encoding='utf-8') as f:
              html = f.read()
          html = re.sub(r'(index-D0pt1Yki\.js)(\?[^"]*)?', rf'\1?v={h}', html)
          html = re.sub(r'(index-WF_ZS38y\.css)(\?[^"]*)?', rf'\1?v={h}', html)
          with open('index.html', 'w', encoding='utf-8') as f:
              f.write(html)
          print(f'Cache-busted index.html with hash {h}')
          PYEOF

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
