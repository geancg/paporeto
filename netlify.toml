[build]
  publish = "."

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/content"
  to = "/.netlify/functions/get-content"
  status = 200

[[redirects]]
  from = "/api/save"
  to = "/.netlify/functions/save-content"
  status = 200

[[redirects]]
  from = "/api/upload"
  to = "/.netlify/functions/upload-image"
  status = 200

[[redirects]]
  from = "/api/image"
  to = "/.netlify/functions/get-image"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
